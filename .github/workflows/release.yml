name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        run: echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up QEMU (for cross)
        if: contains(matrix.target, 'aarch64')
        uses: docker/setup-qemu-action@v3

      - name: Install system dependencies (Linux hosts)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev zip rpm gcc-aarch64-linux-gnu

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-rpm
          cargo install cargo-appimage
          cargo install cross

      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          case "${{ matrix.target }}" in
            x86_64-pc-windows-gnu)
              cross build --release --target ${{ matrix.target }} --target-dir target/${{ matrix.target }}
              cp target/${{ matrix.target }}/release/leenfetch.exe dist/leenfetch-${VERSION}-windows-x86_64.exe
              (cd dist && zip leenfetch-${VERSION}-windows-x86_64.zip leenfetch-${VERSION}-windows-x86_64.exe)
              ;;
            x86_64-unknown-linux-gnu)
              cargo build --release --target ${{ matrix.target }} --target-dir target/${{ matrix.target }}
              cp target/${{ matrix.target }}/release/leenfetch dist/leenfetch
              tar -czvf dist/leenfetch-${VERSION}-linux-x86_64.tar.gz -C dist leenfetch
              rm dist/leenfetch

              cargo deb
              mv target/debian/*.deb dist/leenfetch-${VERSION}-debian-x86_64.deb

              cargo rpm init || true
              cargo rpm build
              cp target/release/rpmbuild/RPMS/x86_64/*.rpm dist/leenfetch-${VERSION}-rhel-x86_64.rpm

              cargo appimage --target ${{ matrix.target }} --release
              cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/leenfetch-${VERSION}-linux-x86_64.AppImage
              ;;
            aarch64-unknown-linux-gnu)
              cross build --release --target ${{ matrix.target }} --target-dir target/${{ matrix.target }}
              cp target/${{ matrix.target }}/release/leenfetch dist/leenfetch
              tar -czvf dist/leenfetch-${VERSION}-linux-aarch64.tar.gz -C dist leenfetch
              rm dist/leenfetch

              cross build --release --target ${{ matrix.target }}
              cargo deb --no-build --no-strip --target ${{ matrix.target }}
              cp target/${{ matrix.target }}/debian/*.deb dist/leenfetch-${VERSION}-debian-aarch64.deb

              cargo rpm build --target ${{ matrix.target }} --no-build
              cp target/${{ matrix.target }}/release/rpmbuild/RPMS/aarch64/*.rpm dist/leenfetch-${VERSION}-rhel-aarch64.rpm

              cargo appimage --target ${{ matrix.target }} --release
              cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/leenfetch-${VERSION}-linux-aarch64.AppImage
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f ! -name "SHA256SUMS.txt" -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/* 
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
